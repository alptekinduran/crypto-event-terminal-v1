<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b1020">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="stylesheet" href="/public/styles.css">
  <title>Giriş | Crypto Event Terminal</title>
</head>
<body class="login-body">
  <main class="login-card">
    <div class="badge">Kişisel kullanım</div>
    <h1>Crypto Event Terminal</h1>
    <p class="muted">Türkçe, kişisel ve haber-trade odaklı terminal.</p>
    <form id="loginForm" class="stack gap-md">
      <label class="label" for="password">Şifre</label>
      <input id="password" name="password" type="password" class="input" placeholder="Şifreni gir" required>
      <button class="btn primary" type="submit">Giriş yap</button>
      <p id="loginError" class="error"></p>
    </form>
    <div class="tips">
      <strong>İpucu:</strong> Replit secrets içinde <code>APP_PASSWORD</code> değerini değiştir.
    </div>
  </main>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });
      const data = await res.json();
      if (!res.ok) {
        document.getElementById('loginError').textContent = data.error || 'Giriş başarısız.';
        return;
      }
      location.href = '/';
    });
  </script>
</body>
</html>
